<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- Content Security Policy（規格書 SEC-02） -->
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; script-src 'self' https://cdn.jsdelivr.net https://cdnjs.cloudflare.com https://www.googletagmanager.com 'unsafe-inline'; style-src 'self' https://cdn.jsdelivr.net https://cdnjs.cloudflare.com 'unsafe-inline'; font-src 'self' https://cdn.jsdelivr.net; img-src 'self' data:; connect-src 'self' https://www.google-analytics.com; base-uri 'self'; form-action 'self';">
  <title>每日飲食記帳系統</title>
  <meta name="description" content="每日飲食記帳系統，記錄三餐、追蹤熱量與三大營養素，達成健康目標。">

  <!-- GA_PLACEHOLDER -->

  <!-- Bootstrap 5.3.3 CSS（含 SRI） -->
  <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
        crossorigin="anonymous">

  <!-- Bootstrap Icons 1.11.3 -->
  <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

  <!-- 自訂樣式 -->
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- 初始化載入遮罩 -->
  <div id="loading-overlay" class="loading-overlay" role="status" aria-label="系統初始化中">
    <div class="text-center">
      <div class="spinner-border text-success mb-3" style="width:3rem;height:3rem;" aria-hidden="true"></div>
      <p class="text-secondary">每日飲食記帳系統初始化中...</p>
      <p class="text-secondary small">首次載入需建立示範資料，請稍候</p>
    </div>
  </div>

  <!-- 主版面（初始隱藏，init 完成後顯示） -->
  <div id="app-layout" class="app-layout d-none">

    <!-- 頂部 Header（所有頁面顯示） -->
    <header id="app-header" class="app-header" role="banner"></header>

    <!-- 左側側邊欄（桌機版，登入後顯示） -->
    <nav id="app-sidebar" class="app-sidebar" aria-label="主要導覽" style="display:none;"></nav>

    <!-- 主內容區 -->
    <main id="app" class="app-main" role="main" tabindex="-1" aria-label="主要內容區域"></main>

    <!-- 底部導覽列（手機版，登入後顯示） -->
    <nav id="app-bottom-nav" class="app-bottom-nav" aria-label="底部快捷導覽" style="display:none;"></nav>

  </div>

  <!-- Toast 通知容器（規格書 PAGE-03） -->
  <div id="toast-container"
       class="toast-container position-fixed top-0 end-0 p-3"
       aria-live="polite"
       aria-atomic="true"
       style="z-index:1200;"></div>

  <!-- bcryptjs（本地版本，避免 CDN 依賴） -->
  <script src="js/bcrypt.min.js"></script>

  <!-- Chart.js 4.4.4 -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>

  <!-- Bootstrap 5.3.3 JS Bundle（含 SRI） -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

  <!-- 應用程式入口（ES6 Module） -->
  <script type="module" src="js/app.js"></script>

</body>
</html>
